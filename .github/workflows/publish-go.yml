name: Publish Go bindings

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-amd64
            lib: liblibveritas_uniffi.a
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: darwin-arm64
            lib: liblibveritas_uniffi.a
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-amd64
            lib: libveritas_uniffi.lib
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build static library
        run: cargo build -p libveritas-uniffi --release

      - name: Upload static library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/${{ matrix.lib }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install uniffi-bindgen-go
        run: cargo install uniffi-bindgen-go --git https://github.com/NordSecurity/uniffi-bindgen-go --tag v0.4.0+v0.28.3

      - name: Build shared library for binding generation
        run: cargo build -p libveritas-uniffi --release

      - name: Generate Go bindings
        run: |
          uniffi-bindgen-go \
            --library target/release/liblibveritas_uniffi.so \
            --out-dir go-publish/

      - name: Download all static libraries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Organize native libraries
        run: |
          mkdir -p go-publish/native/linux-amd64
          mkdir -p go-publish/native/darwin-arm64
          mkdir -p go-publish/native/windows-amd64

          cp artifacts/linux-amd64/liblibveritas_uniffi.a   go-publish/native/linux-amd64/
          cp artifacts/darwin-arm64/liblibveritas_uniffi.a   go-publish/native/darwin-arm64/
          cp artifacts/windows-amd64/libveritas_uniffi.lib   go-publish/native/windows-amd64/

      - name: Patch Go file with cgo directives
        run: |
          # Find the generated .go file
          GO_FILE=$(find go-publish -name '*.go' -type f | head -1)
          echo "Patching $GO_FILE"

          # Insert #cgo LDFLAGS before the #include line
          sed -i 's|// #include <libveritas_uniffi.h>|// #cgo linux,amd64 LDFLAGS: ${SRCDIR}/native/linux-amd64/liblibveritas_uniffi.a -lm -ldl -lpthread\n// #cgo darwin,arm64 LDFLAGS: ${SRCDIR}/native/darwin-arm64/liblibveritas_uniffi.a -framework Security -framework CoreFoundation -lm\n// #cgo windows,amd64 LDFLAGS: ${SRCDIR}/native/windows-amd64/libveritas_uniffi.lib -lws2_32 -lbcrypt -luserenv -lntdll\n// #include <libveritas_uniffi.h>|' "$GO_FILE"

      - name: Setup Go module
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="0.0.0-dev.$(date +%Y%m%d%H%M%S)"
          fi
          cd go-publish

          cat > go.mod << EOF
          module github.com/spacesprotocol/libveritas-go

          go 1.21
          EOF

      - name: Publish to libveritas-go repo
        env:
          GH_TOKEN: ${{ secrets.GO_PUBLISH_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ ! "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="v0.0.0-dev.$(date +%Y%m%d%H%M%S)"
          fi
          cd go-publish

          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release ${VERSION}"
          git tag "${VERSION}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/spacesprotocol/libveritas-go.git"
          git push origin main --force
          git push origin "${VERSION}"
