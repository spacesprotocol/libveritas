name: Publish npm (WASM)

on:
  push:
    tags:
      - "libveritas-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install clang/LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm lld clang

      - name: Build WASM package
        run: |
          wasm-pack build bindings/wasm/ \
            --target web \
            --out-dir ../../pkg \
            --out-name libveritas \
            -- \
            --config 'profile.release.opt-level=3' \
            --config 'profile.release.lto="fat"' \
            --config 'profile.release.codegen-units=1' \
            --config 'profile.release.panic="abort"' \
            --config 'profile.release.strip=true'

      - name: Report WASM size
        run: ls -lh pkg/libveritas_bg.wasm

      - name: Add Node.js wrapper
        run: cp bindings/wasm/node.js pkg/node.js

      - name: Set package version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#libveritas-v}"
          if [[ ! "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="0.0.0-dev.$(date +%Y%m%d%H%M%S)"
          fi
          cd pkg
          # wasm-pack generates package.json; patch the name, version, and exports
          jq --arg v "$VERSION" --arg n "@spacesprotocol/libveritas" \
            '.name = $n | .version = $v | .files += ["node.js"] | .exports = {
              ".": {
                "node": "./node.js",
                "default": "./libveritas.js"
              }
            }' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: npm publish --access public
        working-directory: pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
