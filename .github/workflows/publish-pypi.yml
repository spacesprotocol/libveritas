name: Publish PyPI (Python)

on:
  push:
    tags:
      - "libveritas-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      py_version: ${{ steps.ver.outputs.py_version }}
    steps:
      - id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#libveritas-v}"
          if [[ ! "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="0.0.0-dev.$(date +%Y%m%d%H%M%S)"
          fi
          PY_VERSION=$(echo "$VERSION" | sed 's/-dev\./\.dev/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "py_version=$PY_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            manylinux: auto
          - os: macos-latest
            manylinux: "off"
          - os: windows-latest
            manylinux: "off"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          PY_VERSION="${{ needs.version.outputs.py_version }}"
          sed -i.bak "s/^version = \"0.1.0\"/version = \"$VERSION\"/" bindings/python/Cargo.toml
          sed -i.bak "s/^version = \"0.1.0\"/version = \"$PY_VERSION\"/" bindings/python/pyproject.toml

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: bindings/python/dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish to PyPI
        run: |
          pip install twine
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}